name: Setup Rust Toolchain
description: Install the pinned Rust toolchain from rust-toolchain.toml
inputs:
  components:
    description: Comma-separated list of additional components to install
    required: false
    default: ""
  targets:
    description: Comma-separated list of additional targets to install
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Read Rust toolchain version
      id: parse
      shell: bash
      run: echo "channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ steps.parse.outputs.channel }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
