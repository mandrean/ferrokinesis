name: CI

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  check:
    name: Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-toolchain
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test

  coverage:
    name: Coverage
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-toolchain
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check
          save-if: false
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

  benchmark:
    name: Benchmark
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check
      - name: Install critcmp
        uses: taiki-e/install-action@v2
        with:
          tool: critcmp
      - name: Benchmark base branch
        id: bench_base
        continue-on-error: true
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          cargo bench --bench kinesis_api -- --save-baseline base
      - name: Benchmark PR branch
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          cargo bench --bench kinesis_api -- --save-baseline pr
      - name: Compare and gate on >10% regression
        if: steps.bench_base.outcome == 'success'
        run: |
          critcmp base pr --threshold 10 | tee bench-comparison.txt
          if critcmp base pr --threshold 10 2>&1 | grep -qiE 'regressed'; then
            echo "::error::Benchmark regression >10% detected"
            exit 1
          fi
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            target/criterion/
            bench-comparison.txt
          retention-days: 90

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
