name: Browser Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: browser-demo-pages
  cancel-in-progress: true

jobs:
  pages:
    name: Check Pages Configuration
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check if GitHub Pages is enabled
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(curl --silent --show-error --output /tmp/pages.json --write-out "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "${status}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${status}" = "404" ]; then
            echo "::warning::GitHub Pages is not enabled for ${GITHUB_REPOSITORY}; skipping browser demo deploy."
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          cat /tmp/pages.json
          echo "::error::Unexpected response checking GitHub Pages configuration (HTTP ${status})."
          exit 1

  build:
    name: Build Pages Artifact
    needs: pages
    if: needs.pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: ./.github/actions/setup-rust-toolchain
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demo/package-lock.json
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Install demo dependencies
        run: npm ci --prefix demo
      - name: Build browser demo
        run: npm --prefix demo run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    name: Deploy Pages
    if: needs.pages.outputs.enabled == 'true'
    needs: [pages, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
