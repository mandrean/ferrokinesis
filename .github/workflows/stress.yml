name: Stress Tests

on:
  schedule:
    - cron: "0 3 * * *" # Nightly at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  concurrent-stress:
    name: Concurrent Stress Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check
          save-if: false
      - name: Run concurrent stress tests
        # --test-threads=1: run tests sequentially for isolation (each test starts its own server)
        run: cargo test --test concurrent_stress -- --nocapture --test-threads=1
        timeout-minutes: 10

  ignored-stress:
    name: Slow Stress Tests (ignored)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check
          save-if: false
      - name: Run ignored stress tests
        # --test-threads=1: run tests sequentially for isolation (each test starts its own server)
        run: cargo test -- --ignored --nocapture --test-threads=1
        timeout-minutes: 25

  memory-soak:
    name: Memory Soak (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 95
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check
          save-if: false
      - name: Run memory soak harness
        run: |
          scripts/ci/memory-harness.sh \
            --repo-root "$PWD" \
            --profile soak \
            --duration-secs 3600 \
            --sample-interval-secs 5 \
            --output-dir artifacts/memory-soak
      - name: Upload memory soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-soak-results
          path: artifacts/memory-soak/
          retention-days: 30
