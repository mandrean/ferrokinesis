# ferrokinesis configuration file
#
# Pass via: ferrokinesis --config ferrokinesis.toml
# Or set:   FERROKINESIS_CONFIG=ferrokinesis.toml
#
# All fields are optional. CLI flags and environment variables
# take precedence over values set here.

# Port to listen on (default: 4567)
# CLI: --port | Env: FERROKINESIS_PORT
# port = 4567

# AWS account ID used in ARN generation (default: "000000000000")
# CLI: --account-id | Env: AWS_ACCOUNT_ID
# account_id = "000000000000"

# AWS region used in ARN generation and responses (default: "us-east-1")
# CLI: --region | Env: AWS_REGION / AWS_DEFAULT_REGION
# region = "us-east-1"

# Shard limit for error reporting (default: 10)
# CLI: --shard-limit | Env: FERROKINESIS_SHARD_LIMIT
# shard_limit = 10

# Time streams stay in CREATING state, in milliseconds (default: 500)
# CLI: --create-stream-ms | Env: FERROKINESIS_CREATE_STREAM_MS
# create_stream_ms = 500

# Time streams stay in DELETING state, in milliseconds (default: 500)
# CLI: --delete-stream-ms | Env: FERROKINESIS_DELETE_STREAM_MS
# delete_stream_ms = 500

# Time streams stay in UPDATING state, in milliseconds (default: 500)
# CLI: --update-stream-ms | Env: FERROKINESIS_UPDATE_STREAM_MS
# update_stream_ms = 500

# Shard iterator time-to-live in seconds (min: 1, max: 86400, default: 300)
# CLI: --iterator-ttl-seconds | Env: FERROKINESIS_ITERATOR_TTL_SECONDS
# iterator_ttl_seconds = 300

# Retention reaper interval in seconds (0 = disabled, max: 86400, default: 0)
# CLI: --retention-check-interval-secs | Env: FERROKINESIS_RETENTION_CHECK_INTERVAL_SECS
# retention_check_interval_secs = 0

# Maximum request body size in megabytes (min: 1, max: 4096, default: 7)
# CLI: --max-request-body-mb | Env: FERROKINESIS_MAX_REQUEST_BODY_MB
# max_request_body_mb = 7

# Log level (off, error, warn, info, debug, trace, default: "info")
# CLI: --log-level | Env: FERROKINESIS_LOG_LEVEL
# log_level = "info"

# Log format (plain or json, default: "plain")
# CLI: --log-format | Env: FERROKINESIS_LOG_FORMAT
# log_format = "plain"

# Optional OTLP endpoint for trace export (disabled when omitted)
# For OTLP/HTTP, a base URL like http://localhost:4318 automatically uses /v1/traces.
# CLI: --otlp-endpoint | Env: FERROKINESIS_OTLP_ENDPOINT
# otlp_endpoint = "http://localhost:4317"

# OTLP transport protocol (grpc or http, default: "grpc")
# CLI: --otlp-protocol | Env: FERROKINESIS_OTLP_PROTOCOL
# otlp_protocol = "grpc"

# Trace sample ratio in range 0.0..=1.0 (default: 1.0)
# CLI: --otel-sample-ratio | Env: FERROKINESIS_OTEL_SAMPLE_RATIO
# otel_sample_ratio = 1.0

# OpenTelemetry service.name resource value (default: "ferrokinesis")
# CLI: --otel-service-name | Env: FERROKINESIS_OTEL_SERVICE_NAME
# otel_service_name = "ferrokinesis"

# Enable per-request access logging (default: false, requires "access-log" feature)
# CLI: --access-log | Env: FERROKINESIS_ACCESS_LOG
# access_log = false

# Path to write captured PutRecord/PutRecords data as NDJSON
# CLI: --capture | Env: FERROKINESIS_CAPTURE
# capture = "/tmp/capture.ndjson"

# Anonymize partition keys in capture output (requires capture)
# CLI: --scrub | Env: FERROKINESIS_SCRUB
# scrub = false

# [mirror]
# Mirror PutRecord/PutRecords to another Kinesis-compatible endpoint.
# Requests are forwarded async (fire-and-forget) after local processing completes.
# Requires compiling with `--features mirror` for static env-var credentials only,
# or `--features mirror-aws-config` for the refreshable AWS provider chain
# (`~/.aws/credentials`, `~/.aws/config`, ECS task roles, EC2 IMDS, and IRSA/web identity).

# Kinesis-compatible endpoint to mirror to (default: disabled)
# CLI: --mirror-to | Env: FERROKINESIS_MIRROR_TO
# to = "https://kinesis.us-east-1.amazonaws.com"

# Log response divergences between local and mirror to stderr (default: false)
# Requires `to` to be set.
# CLI: --mirror-diff | Env: FERROKINESIS_MIRROR_DIFF
# diff = false

# Maximum concurrent in-flight mirror requests (default: 64)
# CLI: --mirror-concurrency | Env: FERROKINESIS_MIRROR_CONCURRENCY
# concurrency = 64

# Maximum retries for failed mirror requests (0 = no retries, default: 3)
# CLI: --mirror-max-retries | Env: FERROKINESIS_MIRROR_MAX_RETRIES
# max_retries = 3

# Initial backoff delay between mirror retries in milliseconds (default: 100)
# CLI: --mirror-initial-backoff-ms | Env: FERROKINESIS_MIRROR_INITIAL_BACKOFF_MS
# initial_backoff_ms = 100

# Maximum backoff delay between mirror retries in milliseconds (default: 5000)
# CLI: --mirror-max-backoff-ms | Env: FERROKINESIS_MIRROR_MAX_BACKOFF_MS
# max_backoff_ms = 5000

# TLS certificate and key (requires the "tls" feature)
# Both must be set together, or both omitted.
# CLI: --tls-cert / --tls-key | Env: FERROKINESIS_TLS_CERT / FERROKINESIS_TLS_KEY
# tls_cert = "cert.pem"
# tls_key = "key.pem"
