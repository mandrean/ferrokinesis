[graph]
targets = []

[output]
feature-depth = 1

[advisories]
ignore = [
    # atomic-polyfill is only pulled in when --all-features enables postcard's
    # heapless-cas feature (which we don't use: default-features = false).
    # No upgrade path exists (postcard v2 not released). Not a runtime dependency.
    { id = "RUSTSEC-2023-0089", reason = "transitive dep only under --all-features via postcard/heapless-cas; not used at runtime" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
