[graph]
targets = []

[output]
feature-depth = 1

[advisories]
ignore = [
    # rustls-webpki 0.101.7 is pulled in by rustls 0.21 via aws-sdk-kinesis (dev dep only).
    # The fix (>=0.103.10) is in the 0.103.x series; there is no patched 0.101.x release.
    # aws-sdk-kinesis cannot upgrade to a rustls 0.22+ compatible version without raising our
    # MSRV above Rust 1.87. Not a runtime dependency — test-only.
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki 0.101.7 via rustls 0.21/aws-sdk-kinesis dev dep; no patched 0.101.x; test-only" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
