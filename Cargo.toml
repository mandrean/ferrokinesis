[package]
name = "ferrokinesis"
version = "0.1.0"
edition = "2024"
description = "A local AWS Kinesis mock server for testing, written in Rust"
license = "MIT"

[[bin]]
name = "ferrokinesis"
path = "src/main.rs"

[dependencies]
aes = "0.8"
axum = "0.8"
base64 = "0.22"
cbc = "0.1"
ciborium = "0.2"
clap = { version = "4", features = ["derive"] }
md-5 = "0.10"
num-bigint = "0.4"
num-traits = "0.2"
rand = "0.9"
redb = "3.1"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
aws-config = "1"
aws-sdk-kinesis = "1"
ciborium = "0.2"
reqwest = { version = "0.12", features = ["json"] }
